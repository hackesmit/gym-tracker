<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTR Gym Tracker — Icon Set</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --parchment: #f4e8c1;
    --parchment-dark: #d4c49a;
    --ink: #1a1510;
    --ink-light: #3d3529;
    --gold: #c9a84c;
    --gold-bright: #e6c65a;
    --gold-dim: #8a7234;
    --mithril: #b8c4d0;
    --mordor-red: #8b2500;
    --elvish-green: #2d5a27;
    --gondor-blue: #1e3a5f;
    --bg: #0d0b08;
    --card-bg: #161310;
    --card-border: #2a2520;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--parchment);
    font-family: 'Crimson Text', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,37,0,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    padding: 60px 20px 20px;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.2);
    margin-bottom: 8px;
  }

  header p {
    font-size: 16px;
    color: var(--parchment-dark);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 24px 20px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .controls button {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    color: var(--parchment-dark);
    cursor: pointer;
    transition: all 0.3s;
  }

  .controls button:hover,
  .controls button.active {
    border-color: var(--gold-dim);
    color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .size-toggle {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 20px 24px;
    position: relative;
    z-index: 1;
  }

  .size-toggle button {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 5px 14px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    color: var(--parchment-dark);
    cursor: pointer;
    transition: all 0.3s;
  }

  .size-toggle button:hover,
  .size-toggle button.active {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 2px;
    padding: 0 20px 60px;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .grid.size-lg {
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }

  .grid.size-sm {
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  }

  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px 16px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .icon-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .icon-card:hover::before { opacity: 1; }

  .icon-card:hover {
    border-color: var(--gold-dim);
    transform: translateY(-2px);
  }

  .icon-card svg {
    width: 48px;
    height: 48px;
    transition: all 0.3s;
  }

  .grid.size-lg .icon-card svg { width: 64px; height: 64px; }
  .grid.size-sm .icon-card svg { width: 32px; height: 32px; }

  .icon-card:hover svg {
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.3));
  }

  .icon-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--parchment-dark);
    margin-top: 12px;
    text-align: center;
    line-height: 1.4;
  }

  .icon-meta {
    font-size: 11px;
    color: #665d4e;
    margin-top: 4px;
    font-style: italic;
  }

  .category-label {
    grid-column: 1 / -1;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 30px 0 8px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .category-label::before,
  .category-label::after {
    content: '⟡';
    font-size: 8px;
    opacity: 0.5;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card-bg);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 12px 24px;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .icon-card {
    animation: fadeIn 0.4s ease both;
  }
</style>
</head>
<body>

<header>
  <h1>Icons of Middle-earth</h1>
  <p>A Gym Tracker Icon Set forged in the fires of Mount Doom</p>

const grid = document.getElementById('grid');
const toast = document.getElementById('toast');
let currentFilter = 'all';
let currentSize = 'md';

const categories = {
  nav: 'Dashboard & Navigation',
  strength: 'Strength & Metrics',
  achievement: 'Achievements & Badges',
  journey: 'Journey & Progression',
  session: 'Session Data',
  social: 'The Fellowship'
};

function render() {
  grid.className = 'grid' + (currentSize !== 'md' ? ` size-${currentSize}` : '');
  grid.innerHTML = '';

  const filtered = currentFilter === 'all'
    ? icons
    : icons.filter(i => i.cat === currentFilter);

  let lastCat = '';
  filtered.forEach((icon, idx) => {
    if (icon.cat !== lastCat) {
      lastCat = icon.cat;
      const label = document.createElement('div');
      label.className = 'category-label';
      label.textContent = categories[icon.cat];
      grid.appendChild(label);
    }

    const card = document.createElement('div');
    card.className = 'icon-card';
    card.style.animationDelay = `${(idx % 10) * 40}ms`;
    card.innerHTML = `
      ${icon.svg.replace('currentColor', '#f4e8c1')}
      <div class="icon-label">${icon.name}</div>
      <div class="icon-meta">${icon.meta}</div>
    `;

    card.addEventListener('click', () => {
      const cleanSvg = icon.svg
        .replace(/currentColor/g, 'currentColor')
        .trim();
      navigator.clipboard.writeText(cleanSvg).then(() => {
        toast.textContent = `Copied: ${icon.name}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
      });
    });

    grid.appendChild(card);
  });
}

document.getElementById('filters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  render();
});

document.getElementById('sizes').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#sizes button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentSize = e.target.dataset.size;
  render();
});

render();
</script>
